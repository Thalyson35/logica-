<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1> Atividade 25 </h1>

<script> 

const matriz = [];

for (let i = 0; i < 4; i++) {
  matriz[i] = [];
  for (let j = 0; j < 4; j++) {
    matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`));
  }
}

for (let j = 0; j < 4; j++) {
  let soma = 0;
  let coluna = "";

  for (let i = 0; i < 4; i++) {
    coluna += matriz[i][j] + "  ";
    soma += matriz[i][j];
  }

  console.log(coluna);
  console.log("Soma da coluna " + j + ": " + soma);
}

</script>

</body>
</html>
