<body>
    <h1> Exercício 5 </h1>

    <script> 

        const numeros = [5, 10, 2, 8, 3, 15];
        let maior = numeros[0]; 
        let menor = numeros[0]; 
        for (let i = 1; i < numeros.length; i++) {
            if (numeros[i] > maior) {
                maior = numeros[i]; 
            }
            if (numeros[i] < menor) {
                menor = numeros[i]; 
            }
        }
        console.log("Maior:", maior); 
        console.log("Menor:", menor);
        
    </script>
</body>
