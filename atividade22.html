<body>
    <h1> Atividade 22 </h1>

    <script>
    const matriz = [];
    let soma = 0
    for (let i = 0; i < 4; i++) {
  matriz[i] = [];
  for (let j = 0; j < 4; j++) {
    matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`));
  }
}
 
for (let i = 0; i < 4; i++) {
  let linha = "";
  for (let j = 0; j < 4; j++) {
    linha += matriz[i][j] + "  ";
    soma += matriz[i][j]/16
  }
  console.log(linha);
}
console.log("Soma total: " + soma.toFixed(3));
    </script>
