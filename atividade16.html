<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Exercício 16 </h1>

    <script> 
let matriz = [];
let zero = 0;

for (let i = 0; i < 3; i++) {
    matriz[i] = []; // cria cada linha
    for (let j = 0; j < 3; j++) {
        matriz[i][j] = parseInt(prompt(`Digite o número da posição [${i+1}][${j+1}]`));
        if (matriz[i][j] === 0) {
            zero++;
        }
    }
}

// Exibe a matriz
console.log("Matriz 3x3:");
for (let i = 0; i < 3; i++) {
    console.log(matriz[i].join(" "));
}

console.log(zero + " números são iguais a zero");

    </script>
</body>
</html>
