<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Exercício 7 </h1>

    <script> 
         let positivo = 0;
            let meuVetor = []
            for(let i = 0; i <= 10; i++){
            meuVetor[i] = parseInt(prompt("Digite 10 numeros inteiros: "));
            if(meuVetor[i] > 0){
                positivo ++
            }
            }
            console.log("Os numeros positivos são: " + positivo)

    </script>
</body>
</html>
